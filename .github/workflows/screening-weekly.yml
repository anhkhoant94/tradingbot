name: Screening Pipeline Weekly

# Cap nhat screening_full_results.csv + screening_summary.json + data.js moi tuan
# sau phien thu Sau. 08:15 UTC = 15:15 ICT, de du thoi gian cho EOD data settle.
# Output duoc commit nguoc ve repo de dashboard-auto-refresh.yml picks up va deploy.

on:
  schedule:
    - cron: "15 8 * * 5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Filter mode (opportunity | conservative)"
        required: false
        default: "opportunity"

concurrency:
  group: screening-weekly
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  refresh-screening:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONIOENCODING: utf-8
      PYTHONPATH: ${{ github.workspace }}
      MODE: ${{ github.event.inputs.mode || 'opportunity' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install vnstock

      - name: Restore .cache (history + scores + cp68)
        uses: actions/cache@v4
        with:
          path: |
            .cache/backtest/history_clean
            .cache/backtest/scores_2016_v4
            .cache/backtest/cp68
            .cache/backtest/vnindex_daily.parquet
            .cache/universe.parquet
          key: screening-cache-${{ runner.os }}-${{ hashFiles('.cache/backtest/cp68/AAA.parquet') }}
          restore-keys: |
            screening-cache-${{ runner.os }}-

      - name: Refresh price cache via VPS
        run: python update_dashboard_live_data.py

      - name: Run screening pipeline
        run: |
          ARGS=""
          if [ "$MODE" = "conservative" ]; then
            ARGS="--conservative"
          fi
          python run_stock_screen.py $ARGS

      - name: Regenerate dashboard JS bundles
        run: |
          python generate_dashboard_data.py
          python generate_deep_analysis.py
          python generate_model_history.py

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/screening_full_results.csv \
                  output/screening_summary.json \
                  output/dashboard_live_update_status.json \
                  dashboard/data.js \
                  dashboard/analysis.js \
                  dashboard/history.js \
                  dashboard/dashboard_live_update_status.json
          if git diff --cached --quiet; then
            echo "No screening output changes to commit."
          else
            git commit -m "chore(weekly): refresh screening outputs $(date -u +'%Y-%m-%d')"
            git push origin HEAD:${GITHUB_REF##*/}
          fi

      - name: Trigger dashboard auto refresh
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dashboard-auto-refresh.yml',
              ref: context.ref,
            });
