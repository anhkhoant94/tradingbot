name: Dashboard Auto Refresh

on:
  schedule:
    - cron: "2-59/5 * * * 1-5"
  push:
    branches:
      - main
      - master
    paths:
      - "dashboard/**"
      - "tools/**"
      - "backtest/**"
      - "output/**"
      - "update_dashboard_live_data.py"
      - "generate_dashboard_data.py"
      - "generate_deep_analysis.py"
      - "generate_model_history.py"
  workflow_dispatch:

concurrency:
  group: dashboard-auto-refresh
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT: ${{ vars.VERCEL_PROJECT || 'trading-execution-desk-khoa' }}
      VERCEL_PUBLIC_URL: ${{ vars.VERCEL_PUBLIC_URL || 'https://trading-execution-desk-khoa.vercel.app' }}
      VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      PYTHONIOENCODING: utf-8
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow fastparquet requests beautifulsoup4 lxml html5lib

      - name: Update live data
        working-directory: ${{ github.workspace }}
        run: python update_dashboard_live_data.py

      - name: Regenerate dashboard analysis
        working-directory: ${{ github.workspace }}
        run: python generate_deep_analysis.py

      - name: Regenerate model history
        working-directory: ${{ github.workspace }}
        run: python generate_model_history.py

      - name: Regenerate dashboard data
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f generate_dashboard_data.py ]; then
            python generate_dashboard_data.py
          else
            echo "generate_dashboard_data.py not present in this repo checkout; keeping existing dashboard/data.js"
          fi

      - name: Deploy dashboard to Vercel
        run: python tools/deploy_vercel_dashboard.py --dashboard-dir dashboard --target production --wait

      - name: Verify public dashboard freshness
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          base = os.environ["VERCEL_PUBLIC_URL"].rstrip("/")
          last_error = None
          for attempt in range(1, 13):
              url = f"{base}/dashboard_live_update_status.json?v={int(time.time())}"
              try:
                  with urllib.request.urlopen(url, timeout=30) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
                  updated_at = str(payload.get("updatedAt") or "")
                  if updated_at.startswith(time.strftime("%Y-%m-%d")):
                      history_url = f"{base}/history.js?v={int(time.time())}"
                      with urllib.request.urlopen(history_url, timeout=30) as hist_resp:
                          history = hist_resp.read().decode("utf-8", errors="replace")
                      if '"vniClose": ' not in history or '"vniClose": null' == history.split('"vniClose": ', 1)[1].split("\n", 1)[0].strip().rstrip(","):
                          import re
                          if not re.search(r'"vniClose"\s*:\s*[0-9]', history):
                              last_error = "history.js has no numeric VN-Index points"
                              raise RuntimeError(last_error)
                      print(f"Public dashboard fresh: {updated_at}")
                      sys.exit(0)
                  last_error = f"stale updatedAt={updated_at}"
              except (urllib.error.HTTPError, urllib.error.URLError, TimeoutError, json.JSONDecodeError, RuntimeError) as exc:
                  last_error = repr(exc)
              pri