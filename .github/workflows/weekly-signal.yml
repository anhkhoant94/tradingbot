name: Weekly Signal Friday Close

# Sinh signal/orders cho phien thu Hai ke tiep. Chay sau phien thu Sau:
# 08:45 UTC = 15:45 ICT, sau screening-weekly 30 phut.
# Output day vao output/live_signals/<date>/ va commit nguoc, kich hoat dashboard refresh.

on:
  schedule:
    - cron: "45 8 * * 5"
  workflow_dispatch:
    inputs:
      nav:
        description: "NAV VND"
        required: false
        default: "1000000000"
      as_of:
        description: "Signal date (YYYY-MM-DD, blank = auto)"
        required: false
        default: ""

concurrency:
  group: weekly-signal
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore screening cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/backtest/history_clean
            .cache/backtest/scores_2016_v4
            .cache/backtest/vnindex_daily.parquet
          key: screening-cache-${{ runner.os }}-${{ hashFiles('.cache/backtest/cp68/AAA.parquet') }}
          restore-keys: |
            screening-cache-${{ runner.os }}-

      - name: Refresh price cache
        run: python update_dashboard_live_data.py

      - name: Generate weekly signal
        env:
          NAV: ${{ github.event.inputs.nav || '1000000000' }}
          AS_OF: ${{ github.event.inputs.as_of || '' }}
        run: |
          ARGS="--nav $NAV"
          if [ -n "$AS_OF" ]; then
            ARGS="$ARGS --as-of $AS_OF"
          fi
          python backtest/live_signal_generator.py $ARGS

      - name: Commit live signal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/live_signals
          if git diff --cached --quiet; then
            echo "No live signal changes."
          else
            git commit -m "chore(signal): weekly Monday signal $(date -u +'%Y-%m-%d')"
            git push origin HEAD:${GITHUB_REF##*/}
          fi

      - name: Trigger dashboard auto refresh
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dashboard-auto-refresh.yml',
              ref: context.ref,
            });
